# Bongo Cat — a cat that sits in your bar and slaps when you type or to the beat.
#
# Input reactivity needs `evtest` installed and your user in the `input` group;
# set input devices in the widget settings. Prefer stable /dev/input/by-id/ or
# /dev/input/by-path/ entries over /dev/input/eventN. Audio reactivity uses the
# PipeWire spectrum.

id = "noctalia/bongocat"
name = "Bongo Cat"
version = "1.1.0"
min_noctalia = "5.0.0"
author = "noctalia"
license = "MIT"
icon = "cat"
description = "A cat that slaps your bar when you type or to the beat."
tags = ["fun", "animation", "cat"]

[[widget]]
id = "cat"
entry = "bongocat.luau"

  [[widget.setting]]
  key = "input_devices"
  type = "string_list"
  label = "Input devices"
  description = "Prefer /dev/input/by-id/*-event-* or /dev/input/by-path/*-event-*; /dev/input/eventN can change after kernel or device updates"
  default = []

  [[widget.setting]]
  key = "audio_spectrum"
  type = "bool"
  label = "React to audio"
  default = false

  [[widget.setting]]
  key = "tappy_mode"
  type = "bool"
  label = "Tap to the beat"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }

  [[widget.setting]]
  key = "rave_mode"
  type = "bool"
  label = "Rave colors on beat"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }

  [[widget.setting]]
  key = "use_mpris_filter"
  type = "bool"
  label = "Only react while media plays"
  default = false
  visible_when = { key = "audio_spectrum", values = ["true"] }
