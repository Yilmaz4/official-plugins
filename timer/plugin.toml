# Reference multi-entry plugin: a countdown timer whose bar widget, panel, and
# desktop widget are all thin UI clients of one headless service, sharing a
# single timer through noctalia.state. Demonstrates:
#
# service -> headless countdown logic + state, with command handling (START/PAUSE/RESET)
# bar     -> declarative UI with per-placement settings; opens the panel
# panel   -> interactive controls (typed duration input) driving the service
# desktop -> keyboard-free +/- duration adjusters + a progress bar, pinned to the desktop
#
# All three UI entries watch noctalia.state, so they reflect and control the
# same countdown live.

id = "noctalia/timer"
name = "Timer"
version = "1.2.0"
plugin_api = 3
author = "noctalia"
license = "MIT"
dependencies = []
tags = ["countdown", "utility"]
icon = "clock"
description = "A countdown timer with bar widget, panel, and desktop widget."

[[widget]]
id = "bar"
entry = "bar.luau"

  [[widget.setting]]
  key = "show_idle_on_horizontal"
  type = "bool"
  label_key = "settings.show_idle.label"
  description_key = "settings.show_idle.description"
  default = true

[[panel]]
id = "panel"
entry = "panel.luau"
width = 320
height = 280
placement = "attached"
position = "auto"
open_near_click = true

[[service]]
id = "timer"
entry = "service.luau"

[[desktop_widget]]
id = "desktop"
entry = "desktop.luau"

  [[desktop_widget.setting]]
  key = "color"
  type = "color"
  label_key = "settings.color.label"
  description_key = "settings.color.description"
  default = "primary"

  [[desktop_widget.setting]]
  key = "show_progress"
  type = "bool"
  label_key = "settings.show_progress.label"
  default = true
